name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  KEEPASS_VERSION: "2.61.1"
  # SourceForge 官方 CLI 下载格式，配合 curl -L 跟随重定向
  # https://sourceforge.net/p/forge/documentation/Downloading%20files%20via%20the%20command%20line/
  KEEPASS_DOWNLOAD_URL: https://sourceforge.net/projects/keepass/files/KeePass%202.x/2.61.1/KeePass-2.61.1.zip/download

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download official KeePass
        shell: pwsh
        run: |
          $zip = Join-Path $env:RUNNER_TEMP "KeePass-$env:KEEPASS_VERSION.zip"
          curl.exe -fsSL "$env:KEEPASS_DOWNLOAD_URL" -o $zip

          if (-not (Test-Path $zip) -or (Get-Item $zip).Length -lt 1MB) {
            throw "KeePass download failed or file is too small"
          }

          $header = [System.IO.File]::ReadAllBytes($zip)[0..1]
          if ($header[0] -ne 0x50 -or $header[1] -ne 0x4B) {
            throw "Downloaded file is not a ZIP archive (got HTML redirect page?)"
          }

          $keepassDir = Join-Path $env:RUNNER_TEMP "KeePass"
          Expand-Archive -Path $zip -DestinationPath $keepassDir -Force

          $keepass = Join-Path $keepassDir "KeePass.exe"
          if (-not (Test-Path $keepass)) {
            throw "KeePass.exe not found in extracted archive"
          }

          $version = (Get-Item $keepass).VersionInfo.FileVersion
          if (-not $version.StartsWith("$env:KEEPASS_VERSION.")) {
            throw "Unexpected KeePass version: $version (expected $env:KEEPASS_VERSION.x)"
          }
          Write-Host "Downloaded KeePass $version from SourceForge"

          New-Item -ItemType Directory -Force -Path "bin\Debug" | Out-Null
          Copy-Item $keepass "bin\Debug\KeePass.exe"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release
        run: msbuild IIME.sln /p:Configuration=Release /p:Platform="Any CPU" /verbosity:minimal

      - name: Create PLGX
        shell: pwsh
        run: |
          $keepassDir = Join-Path $env:RUNNER_TEMP "KeePass"
          $keepass = Join-Path $keepassDir "KeePass.exe"
          if (-not (Test-Path $keepass)) {
            throw "KeePass.exe not found at $keepass"
          }

          # KeePass 要求 --plgx-create 使用绝对路径
          $staging = [System.IO.Path]::GetFullPath((Join-Path $env:RUNNER_TEMP "IIME"))
          if (Test-Path $staging) {
            Remove-Item $staging -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $staging | Out-Null

          Copy-Item IIME.cs, IIME.csproj, update.txt -Destination $staging
          Copy-Item Properties -Destination (Join-Path $staging "Properties") -Recurse

          # csproj 引用了 bin\Debug\KeePass.exe，打包进 PLGX 时一并带上
          $stagingKeePassDir = Join-Path $staging "bin\Debug"
          New-Item -ItemType Directory -Force -Path $stagingKeePassDir | Out-Null
          Copy-Item $keepass (Join-Path $stagingKeePassDir "KeePass.exe")

          Write-Host "Creating PLGX from $staging"
          $args = @(
            "--plgx-create", $staging,
            "--plgx-prereq-os:Windows",
            "--plgx-prereq-net:4.7.2",
            "--plgx-prereq-kp:2.61",
            "--debug"
          )

          # 必须在 KeePass 目录下运行，否则可能找不到依赖 DLL
          $proc = Start-Process -FilePath $keepass -ArgumentList $args -WorkingDirectory $keepassDir -Wait -PassThru -NoNewWindow
          if ($proc.ExitCode -ne 0) {
            throw "KeePass --plgx-create failed with exit code $($proc.ExitCode)"
          }

          # 输出文件名为 <staging目录名>.plgx，位于 staging 的父目录
          $plgxName = (Split-Path $staging -Leaf) + ".plgx"
          $plgx = Join-Path (Split-Path $staging -Parent) $plgxName
          Write-Host "Expected PLGX path: $plgx"

          if (-not (Test-Path $plgx)) {
            Write-Host "PLGX not found at expected path, searching under $env:RUNNER_TEMP ..."
            $found = Get-ChildItem $env:RUNNER_TEMP -Filter "*.plgx" -Recurse -ErrorAction SilentlyContinue
            $found | ForEach-Object { Write-Host "  Found: $($_.FullName)" }
            throw "PLGX file was not created"
          }

          Copy-Item $plgx (Join-Path $env:GITHUB_WORKSPACE "IIME.plgx")
          Write-Host "Created PLGX ($((Get-Item $plgx).Length) bytes)"

      - name: Attest build artifacts
        if: github.event_name != 'pull_request'
        uses: actions/attest@v4
        with:
          subject-path: |
            IIME.plgx
            bin/Release/IIME.dll

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: IIME-build
          path: |
            bin/Release/IIME.dll
            bin/Release/IIME.pdb
            IIME.plgx
          if-no-files-found: error

  release:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: IIME-build

      - name: Resolve version
        id: version
        shell: bash
        run: |
          VERSION=$(grep -oP 'IIME:\K[\d.]+' update.txt)
          if [ -z "$VERSION" ]; then
            echo "Could not parse version from update.txt" >&2
            exit 1
          fi
          TAG="v$(echo "$VERSION" | cut -d. -f1-3)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION (tag: $TAG)"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: IIME ${{ steps.version.outputs.tag }}
          files: |
            IIME.plgx
            bin/Release/IIME.dll
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
