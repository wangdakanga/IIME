name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  KEEPASS_VERSION: "2.61.1"
  # SourceForge 官方 CLI 下载格式，配合 curl -L 跟随重定向
  # https://sourceforge.net/p/forge/documentation/Downloading%20files%20via%20the%20command%20line/
  KEEPASS_DOWNLOAD_URL: https://sourceforge.net/projects/keepass/files/KeePass%202.x/2.61.1/KeePass-2.61.1.zip/download

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download official KeePass
        shell: pwsh
        run: |
          $zip = Join-Path $env:RUNNER_TEMP "KeePass-$env:KEEPASS_VERSION.zip"
          curl.exe -fsSL "$env:KEEPASS_DOWNLOAD_URL" -o $zip

          if (-not (Test-Path $zip) -or (Get-Item $zip).Length -lt 1MB) {
            throw "KeePass download failed or file is too small"
          }

          $header = [System.IO.File]::ReadAllBytes($zip)[0..1]
          if ($header[0] -ne 0x50 -or $header[1] -ne 0x4B) {
            throw "Downloaded file is not a ZIP archive (got HTML redirect page?)"
          }

          $dir = Join-Path $env:RUNNER_TEMP "KeePass"
          Expand-Archive -Path $zip -DestinationPath $dir -Force

          $keepass = Join-Path $dir "KeePass.exe"
          if (-not (Test-Path $keepass)) {
            throw "KeePass.exe not found in extracted archive"
          }

          $version = (Get-Item $keepass).VersionInfo.FileVersion
          if (-not $version.StartsWith("$env:KEEPASS_VERSION.")) {
            throw "Unexpected KeePass version: $version (expected $env:KEEPASS_VERSION.x)"
          }
          Write-Host "Downloaded KeePass $version from SourceForge"

          New-Item -ItemType Directory -Force -Path "bin\Debug" | Out-Null
          Copy-Item $keepass "bin\Debug\KeePass.exe"

          "KEEPASS_EXE=$keepass" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release
        run: msbuild IIME.sln /p:Configuration=Release /p:Platform="Any CPU" /verbosity:minimal

      - name: Prepare PLGX source directory
        shell: pwsh
        run: |
          $staging = Join-Path $env:RUNNER_TEMP "IIME"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item IIME.cs, IIME.csproj, update.txt -Destination $staging
          Copy-Item Properties -Destination $staging -Recurse
          "PLGX_STAGING=$staging" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Create PLGX
        shell: pwsh
        run: |
          $staging = $env:PLGX_STAGING
          & $env:KEEPASS_EXE --plgx-create $staging `
            --plgx-prereq-os:Windows `
            --plgx-prereq-net:4.7.2 `
            --plgx-prereq-kp:2.61 `
            --debug

          $plgx = Join-Path (Split-Path $staging -Parent) "IIME.plgx"
          if (-not (Test-Path $plgx)) {
            throw "PLGX file was not created at $plgx"
          }

          Copy-Item $plgx (Join-Path $env:GITHUB_WORKSPACE "IIME.plgx")

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: IIME-build
          path: |
            bin/Release/IIME.dll
            bin/Release/IIME.pdb
            IIME.plgx
          if-no-files-found: error
